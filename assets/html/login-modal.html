<div id="loginModal" class="modal">
  
  <div class="modal-card card">

    <span class="close-btn" onclick="closeModal('loginModal')">
      &times;
    </span>

    <h2>HRIS Login</h2>

    <input
      id="username"
      placeholder="Username">

    <input
      id="password"
      type="password"
      placeholder="Password">

    <button onclick="login()">
      Sign In
    </button>

    <div id="msg"></div>

  </div>

</div>
